
name: github-actions-SQA-Spring2026

on:
  push:
  pull_request:

jobs:
  vv-check-SQA:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Verification
        run: python scripts/verify.py

      - name: Print Demo Message
        run: echo "Hello from GitHub Actions! I am modifying this file "

      - name: Run Validation
        run: python scripts/validate.py

      # Forensic Method 5: log CI build pass/fail status
      - name: Log Forensic CI Build Status
        if: always()
        run: |
          STATUS=$( [ "${{ job.status }}" = "success" ] && echo "PASSED" || echo "FAILED" )
          SEVERITY=$( [ "$STATUS" = "PASSED" ] && echo "INFO" || echo "ERROR" )
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          python3 - <<EOF
          import json, os
          log = "forensic_log.json"
          events = json.load(open(log)) if os.path.exists(log) else []
          events.append({"timestamp": "$TIMESTAMP", "event_type": "CI_BUILD_STATUS", "severity": "$SEVERITY", "detail": "CI build $STATUS"})
          json.dump(events, open(log, "w"), indent=2)
          print(f"[Forensic] CI_BUILD_STATUS: $STATUS")
          EOF

      - name: Upload Forensic Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensic-log
          path: forensic_log.json
          if-no-files-found: ignore
